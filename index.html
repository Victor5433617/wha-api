<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enviar mensajes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Enviar Mensajes de WhatsApp</h2>
    <form action="enviar.php" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="numeros" class="form-label">Números (uno por línea):</label>
        <textarea name="numeros" id="numeros" rows="6" placeholder="595983696945&#10;595981112233"></textarea>
      </div>
      
      <div class="form-group">
        <label for="mensaje" class="form-label">Mensaje:</label>
        <textarea name="mensaje" id="mensaje" rows="4" placeholder="Escribí tu mensaje acá..."></textarea>
      </div>

      <div class="form-group">
        <label for="imagen" class="form-label">Imagen (opcional):</label>
        <input type="file" name="imagen" id="imagen" accept="image/*" />
      </div>

      <button type="submit" class="btn btn-primary mb-3">Enviar</button>
    </form>

    <!-- Botón para obtener QR -->
    <button id="btnQr" type="button" class="btn btn-success w-100">Obtener QR</button>
  </div>

  <!-- Modal para mostrar QR -->
  <div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="qrModalLabel">Escanea el código QR</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body text-center" id="qr-container">
          <p>Cargando...</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const btnQr = document.getElementById('btnQr');
    const qrContainer = document.getElementById('qr-container');
    const qrModal = new bootstrap.Modal(document.getElementById('qrModal'));

    btnQr.addEventListener('click', async () => {
      qrContainer.innerHTML = '<p>Cargando...</p>';
      qrModal.show(); 

      try {
        const response = await fetch('http://localhost:21465/api/victor/start-session', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer $2b$10$Tebv4lzK2JJQuU470moOcuu1j_XLbDTj1nVaLxvimLqQreRT8QKeK' // Cambia por tu token real
          },
          body: JSON.stringify({})
        });

        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          qrContainer.innerHTML = `<p style="color:red;">Respuesta no válida del servidor:</p><pre>${text}</pre>`;
          return;
        }

        if (data.qrcode && data.qrcode.startsWith('data:image')) {
          qrContainer.innerHTML = `<img src="${data.qrcode}" alt="Código QR" width="300" />`;
        } else if (data.status && data.status.toUpperCase() === 'INCHAT') {
          qrContainer.innerHTML = '<p>✅ Sesión ya iniciada. No es necesario escanear QR.</p>';
        } else {
          qrContainer.innerHTML = `<p>⚠️ Advertencia: <b>${data.status || 'N/A'}</b></p><pre>Cogido QR ya Escaneado</pre>`;
        }
      } catch (error) {
        console.error(error);
        qrContainer.innerHTML = '<p style="color:red;">❌ Error al conectar con la API</p>';
      }
    });
  </script>
</body>
</html>
