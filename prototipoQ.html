cd<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Obtener QR de WhatsApp</title>
</head>
<body>
  <h2>Escanea el código QR</h2>
  <button id="btnQr">Obtener QR</button>
  <div id="qr-container" style="margin-top: 20px;"></div>

  <script>
    document.getElementById('btnQr').addEventListener('click', async () => {
      const container = document.getElementById('qr-container');
      container.innerHTML = "Cargando...";

      try {
        const response = await fetch('http://localhost:21465/api/victor/start-session', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer $2b$10$Tebv4lzK2JJQuU470moOcuu1j_XLbDTj1nVaLxvimLqQreRT8QKeK'
          },
          body: JSON.stringify({})  // enviar body vacío para POST
        });

        const text = await response.text();
        console.log('Respuesta completa:', text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (jsonError) {
          container.innerHTML = `
            <p style='color:red;'>❌ La respuesta no es JSON válido:</p>
            <pre>${text}</pre>
          `;
          return;
        }

        container.innerHTML = '';

        // Mostrar imagen si qrcode existe y parece ser base64
        if (data.qrcode && data.qrcode.startsWith('data:image')) {
          const img = document.createElement('img');
          img.src = data.qrcode;
          img.alt = "Código QR";
          img.width = 200;
          container.appendChild(img);
        } else if (data.status && data.status.toUpperCase() === "INCHAT") {
          container.innerHTML = "<p>✅ Sesión ya iniciada. No es necesario escanear QR.</p>";
        } else {
          // Mostrar estado y JSON para debug
          container.innerHTML = `
            <p>⚠️ Estado desconocido o QR no encontrado: <b>${data.status || 'N/A'}</b></p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        }

      } catch (error) {
        console.error(error);
        container.innerHTML = "<p style='color:red;'>❌ Error al conectar con la API</p>";
      }
    });
  </script>
</body>
</html>
